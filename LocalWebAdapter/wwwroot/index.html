<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Makerspace Logger Local Adapter</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .row { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
    input, select, button { padding: 8px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
    .meta { margin: 12px 0; font-weight: 600; }
    .tiny { color: #666; font-size: 12px; }
    .ok { color: #0a7f2e; }
    .bad { color: #c62828; }
  </style>
</head>
<body>
  <h2>Makerspace Logger — Local Web App</h2>
  <p>Runs in browser, backed by local C# adapter + SQLite.</p>

  <div class="tiny">API: <code id="apiBase"></code> <span id="apiStatus"></span></div>

  <div class="row">
    <select id="locationId"></select>
    <input id="studentId" placeholder="Student ID" />
    <input id="firstName" placeholder="First Name (optional)" />
    <input id="lastName" placeholder="Last Name (optional)" />
    <button onclick="submitEvent()">Record Data Point</button>
    <button onclick="exportCsv()">Export Snapshot CSV</button>
    <button onclick="initDatabase()">Create/Repair DB</button>
  </div>

  <div class="row">
    <input id="newLocationName" placeholder="New location name" />
    <button onclick="addLocation()">Add Location</button>
  </div>

  <div class="meta" id="summary">Loading summary...</div>
  <div class="tiny">Live CSV endpoint: <a id="liveCsvLink" target="_blank" rel="noopener">open realtime.csv</a></div>

  <table>
    <thead><tr><th>When (Local)</th><th>Student ID</th><th>Name</th><th>Location</th><th>Remove</th></tr></thead>
    <tbody id="events"></tbody>
  </table>

<script>
const API_BASE = (location.protocol === 'file:') ? 'http://127.0.0.1:5057' : '';
document.getElementById('apiBase').innerText = API_BASE || '(same-origin)';
const scannerState = { buffer: '', timer: null };

async function api(path, opts) {
  const response = await fetch(`${API_BASE}${path}`, opts);
  if (!response.ok) {
    let message = `HTTP ${response.status}`;
    try {
      const body = await response.json();
      message = body.error || message;
    } catch {}
    throw new Error(message);
  }
  return response.json();
}

async function checkHealth() {
  try {
    await api('/api/health');
    apiStatus('Connected', true);
    return true;
  } catch {
    apiStatus('Adapter offline', false);
    return false;
  }
}

function apiStatus(text, ok) {
  const el = document.getElementById('apiStatus');
  el.innerText = text;
  el.className = ok ? 'ok' : 'bad';
}

async function fetchSummary() {
  const loc = document.getElementById('locationId').value;
  const q = loc ? `?locationId=${encodeURIComponent(loc)}` : '';
  const s = await api(`/api/summary${q}`);
  document.getElementById('summary').innerText = `Data points: ${s.eventCount} | Unique students: ${s.uniqueStudents} | Last update: ${s.lastEventLocal ?? '—'}`;
}

async function fetchEvents() {
  const rows = await api('/api/events?take=100');
  document.getElementById('events').innerHTML = rows.map(r =>
    `<tr>
      <td>${r.timestampLocal}</td>
      <td>${r.scannedStudentId}</td>
      <td>${r.nameAtScan || ''}</td>
      <td>${r.locationName}</td>
      <td><button onclick="deleteEvent('${r.id}')">x</button></td>
    </tr>`
  ).join('');
}

async function loadLocations() {
  const rows = await api('/api/locations');
  const select = document.getElementById('locationId');
  const current = select.value;
  select.innerHTML = rows.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
  if (current && rows.some(r => r.id === current)) select.value = current;
}

async function submitEvent() {
  try {
    const payload = {
      studentId: document.getElementById('studentId').value,
      firstName: document.getElementById('firstName').value,
      lastName: document.getElementById('lastName').value,
      locationId: document.getElementById('locationId').value
    };

    await api('/api/events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    document.getElementById('studentId').value = '';
    await refreshAll();
  } catch (err) {
    alert(err.message || 'Failed to record event');
  }
}

async function refreshAll() {
  const healthy = await checkHealth();
  if (!healthy) return;

  const liveCsvLink = document.getElementById('liveCsvLink');
  liveCsvLink.href = `${API_BASE}/api/realtime.csv`;

  await loadLocations();
  await fetchSummary();
  await fetchEvents();
  focusStudentId();
}

async function exportCsv() {
  const response = await fetch(`${API_BASE}/api/export.csv`);
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  const blob = await response.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `makerspace-export-${new Date().toISOString().replace(/[:.]/g, '-')}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function initDatabase() {
  await api('/api/admin/init-db', { method: 'POST' });
  await refreshAll();
  alert('Database is ready.');
}

async function addLocation() {
  const name = document.getElementById('newLocationName').value.trim();
  if (!name) return alert('Please enter a location name.');

  await api('/api/locations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });

  document.getElementById('newLocationName').value = '';
  await refreshAll();
}

async function deleteEvent(eventId) {
  const ok = confirm('Delete this data point permanently?');
  if (!ok) return;

  await api(`/api/events/${encodeURIComponent(eventId)}`, { method: 'DELETE' });
  await refreshAll();
}

function focusStudentId() {
  document.getElementById('studentId').focus();
}

function startScannerCapture() {
  document.addEventListener('keydown', async (e) => {
    const active = document.activeElement;
    const isTypingTarget = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');

    if (!isTypingTarget) {
      if (/^[0-9A-Za-z]$/.test(e.key)) {
        scannerState.buffer += e.key;
        document.getElementById('studentId').value = scannerState.buffer;
        e.preventDefault();
      } else if (e.key === 'Enter' && scannerState.buffer.length > 0) {
        e.preventDefault();
        await submitEvent();
        scannerState.buffer = '';
      }
    }

    if (scannerState.timer) clearTimeout(scannerState.timer);
    scannerState.timer = setTimeout(() => { scannerState.buffer = ''; }, 500);
  });

  document.getElementById('studentId').addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      await submitEvent();
    }
  });

  document.getElementById('locationId').addEventListener('change', async () => {
    await fetchSummary();
    await fetchEvents();
  });
}

refreshAll();
startScannerCapture();
setInterval(refreshAll, 5000);
</script>
</body>
</html>
